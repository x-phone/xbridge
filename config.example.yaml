listen:
  http: "0.0.0.0:8080"

# SIP client — register on a PBX as an extension or with a cloud trunk provider.
# Works the same way for both: xbridge registers as a SIP client and receives
# calls via webhooks + WebSocket audio.
sip:
  username: "1001"
  password: "your-sip-password"
  host: "192.168.1.10"          # PBX address or cloud provider (e.g. sip.telnyx.com)
  transport: "udp"              # udp | tcp | tls
  rtp_port_min: 0               # 0 = OS-assigned (dev/testing)
  rtp_port_max: 0               # For production, use a fixed range:
  # rtp_port_min: 10000         #   small:  10000–10100
  # rtp_port_max: 10100         #   medium: 10000–20000
  srtp: false
  # stun_server: "stun.l.google.com:19302"

# Multi-trunk setup (overrides sip block above)
# trunks:
#   - name: "telnyx"
#     username: "1001"
#     password: "secret1"
#     host: "sip.telnyx.com"
#     transport: "tls"
#     srtp: true
#   - name: "twilio"
#     username: "2001"
#     password: "secret2"
#     host: "sip.twilio.com"

webhook:
  url: "http://localhost:3000/events"
  timeout: "5s"
  retry: 1

stream:
  encoding: "audio/x-mulaw"    # audio/x-mulaw | audio/x-l16
  sample_rate: 8000

