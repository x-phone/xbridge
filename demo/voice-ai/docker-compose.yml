# Voice AI Demo — xpbx + xbridge + voice-app
#
# Requires xpbx repo cloned as sibling: ../../../xpbx/
# Install: git clone https://github.com/x-phone/xpbx.git
#
# Usage:
#   cd demo/voice-ai
#   docker compose up --build

services:
  asterisk:
    image: andrius/asterisk:latest
    entrypoint: ["/scripts/entrypoint.sh", "-f"]
    tty: true
    stdin_open: true
    user: "0"
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
      - "10000-10099:10000-10099/udp"
    volumes:
      - ../../../xpbx/asterisk/config:/etc/asterisk
      - ../../../xpbx/asterisk/scripts/entrypoint.sh:/scripts/entrypoint.sh:ro
      - demo-data:/data
    environment:
      - EXTERNAL_IP=${EXTERNAL_IP:-}
      - VOICEWORKER_HOST=xbridge:5080
      - VOICEWORKER_EXTEN=2000
    networks:
      demo:
        ipv4_address: 10.200.0.10

  xpbx:
    build: ../../../xpbx/server
    environment:
      - XPBX_LISTEN_ADDR=:8080
      - XPBX_DB_PATH=/data/asterisk-realtime.db
      - ARI_HOST=asterisk
      - ARI_PORT=8088
      - ARI_USER=xpbx
      - ARI_PASSWORD=secret
    ports:
      - "8080:8080"
    volumes:
      - demo-data:/data
    depends_on: [asterisk]
    networks: [demo]

  xbridge:
    build:
      context: ../..
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
      - "5080:5080/udp"
      - "10200-10400:10200-10400/udp"
    volumes:
      - ./xbridge.yaml:/etc/xbridge/config.yaml:ro
    environment:
      - RUST_LOG=info
    depends_on: [asterisk]
    networks:
      demo:
        ipv4_address: 10.200.0.20

  voice-app:
    build: ../voice-app
    ports:
      - "3000:3000"
    environment:
      - XBRIDGE_HOST=10.200.0.20:8090
    depends_on: [xbridge]
    networks:
      demo:
        ipv4_address: 10.200.0.30

volumes:
  demo-data:

networks:
  demo:
    driver: bridge
    ipam:
      config:
        - subnet: 10.200.0.0/24
