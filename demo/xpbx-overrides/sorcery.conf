;
; sorcery.conf — Demo override
; Load PJSIP objects from flat files first, then Realtime (SQLite).
; This lets the demo define voiceworker-trunk in pjsip.conf while
; xpbx manages extensions via Realtime.
;
[res_pjsip]
endpoint = config,pjsip.conf
endpoint = realtime,ps_endpoints
auth = config,pjsip.conf
auth = realtime,ps_auths
aor = config,pjsip.conf
aor = realtime,ps_aors
contact = astdb,registrar

[res_pjsip_endpoint_identifier_user]
endpoint = config,pjsip.conf
endpoint = realtime,ps_endpoints

[res_pjsip_endpoint_identifier_ip]
endpoint = config,pjsip.conf
endpoint = realtime,ps_endpoints
