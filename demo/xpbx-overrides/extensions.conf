;
; extensions.conf — Demo override
; Routes extension 2000 to xbridge via voiceworker-trunk
;

[general]
static=yes
writeprotect=no

[from-internal]
exten => 1001,hint,PJSIP/1001

; Dial 2000 → voiceworker-trunk → xbridge → voice-app
exten => 2000,1,Dial(PJSIP/2000@voiceworker-trunk,30)
 same => n,Hangup()

; Fall through to Realtime for any other extensions managed by xpbx
switch => Realtime/@

[from-voiceworker]
switch => Realtime/@
