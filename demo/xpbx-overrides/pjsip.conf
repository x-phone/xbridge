;
; pjsip.conf — Demo override
; Defines voiceworker-trunk → xbridge:5080
; Extension 1001 is managed by xpbx via Realtime (SQLite)
;

[global]
type=global
endpoint_identifier_order=ip,username,anonymous

; --- Voiceworker trunk (routes to xbridge) ---

[voiceworker-trunk]
type=endpoint
transport=transport-udp
context=from-voiceworker
disallow=all
allow=ulaw,alaw
direct_media=no
aors=voiceworker-aor
media_address=10.200.0.10

[voiceworker-aor]
type=aor
contact=sip:10.200.0.20:5080

[voiceworker-identify]
type=identify
endpoint=voiceworker-trunk
match=172.16.0.0/12
match=10.0.0.0/8
match=192.168.0.0/16

; Transport config generated at runtime by entrypoint.sh
#include pjsip_transport.conf
