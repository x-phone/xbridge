services:
  xbridge:
    image: ghcr.io/x-phone/xbridge:latest
    ports:
      - "8080:8080"
      - "10000-10100:10000-10100/udp"
    volumes:
      - ./config.yaml:/etc/xbridge/config.yaml:ro
    environment:
      - RUST_LOG=info
    depends_on:
      - echo-bot

  echo-bot:
    build: .
    ports:
      - "3000:3000"
    environment:
      - XBRIDGE_HOST=xbridge:8080
      - DEMO_PORT=3000
