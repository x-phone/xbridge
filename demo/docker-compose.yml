services:
  xbridge:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "10200-10300:10200-10300/udp"
    volumes:
      - ./config.yaml:/etc/xbridge/config.yaml:ro
    environment:
      - RUST_LOG=info
    depends_on:
      - echo-bot

  echo-bot:
    build: .
    environment:
      - XBRIDGE_HOST=xbridge:8080
      - DEMO_PORT=3000
