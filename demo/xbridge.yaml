listen:
  http: "0.0.0.0:8090"

# Register as extension 1002 on xpbx/Asterisk
sip:
  username: "1002"
  password: "password123"
  host: "10.200.0.10"
  transport: "udp"
  rtp_port_min: 10300
  rtp_port_max: 10400

# Trunk host mode — accept SIP from xpbx on the Docker network
server:
  listen: "0.0.0.0:5080"
  rtp_port_min: 10200
  rtp_port_max: 10300
  rtp_address: "10.200.0.20"
  peers:
    - name: "xpbx"
      host: "10.200.0.10"
    # To add an external SIP trunk (Twilio, Telnyx, etc.), add a peer with
    # their signaling IPs/CIDRs and set rtp_address to your public IP:
    # - name: "twilio"
    #   hosts: ["54.172.60.0/30", "54.244.51.0/30"]
    #   rtp_address: "YOUR_PUBLIC_IP"

# Webhook points to the voice-app backend
webhook:
  url: "http://10.200.0.30:3000/webhook"
  timeout: "5s"

# Audio streaming to the voice-app via WebSocket
stream:
  mode: "native"
  encoding: "audio/x-l16"
  sample_rate: 8000
